<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" font-family="ui-monospace,Menlo,Monaco,'Cascadia Code',monospace" font-size="12">
  <rect width="900" height="520" fill="#0e0e0e"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" fill="#e0e0e0" font-size="15" font-weight="bold">bosch-sdlc — Runtime Architecture</text>

  <!-- ═══════════════════════════════════════════════════════════
       LEFT: npx entry
  ═══════════════════════════════════════════════════════════ -->
  <rect x="28" y="56" width="148" height="44" rx="8" fill="#1a1a1a" stroke="#3a3a3a" stroke-width="1.5"/>
  <text x="102" y="73" text-anchor="middle" fill="#e0e0e0" font-size="11" font-weight="bold">npx bosch-sdlc</text>
  <text x="102" y="90" text-anchor="middle" fill="#888" font-size="10">bin.ts entry point</text>

  <!-- arrow: npx -> Server box -->
  <line x1="176" y1="78" x2="210" y2="78" stroke="#4dd9c0" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ═══════════════════════════════════════════════════════════
       CENTER: Server container
  ═══════════════════════════════════════════════════════════ -->
  <rect x="210" y="44" width="360" height="310" rx="12" fill="#111" stroke="#2d2d2d" stroke-width="1.5"/>
  <text x="390" y="64" text-anchor="middle" fill="#aaa" font-size="11">HTTP + WebSocket Server (Express / ws)</text>

  <!-- REST API box -->
  <rect x="228" y="76" width="148" height="44" rx="6" fill="#1c1c1c" stroke="#333" stroke-width="1"/>
  <text x="302" y="93" text-anchor="middle" fill="#e0e0e0" font-size="11" font-weight="bold">REST API</text>
  <text x="302" y="109" text-anchor="middle" fill="#666" font-size="10">/api/runs  /api/workspaces</text>

  <!-- WebSocket rooms box -->
  <rect x="394" y="76" width="158" height="44" rx="6" fill="#1c1c1c" stroke="#333" stroke-width="1"/>
  <text x="473" y="93" text-anchor="middle" fill="#e0e0e0" font-size="11" font-weight="bold">WebSocket rooms</text>
  <text x="473" y="109" text-anchor="middle" fill="#666" font-size="10">keyed by run_id</text>

  <!-- SQLite box -->
  <rect x="228" y="144" width="148" height="44" rx="6" fill="#1c1c1c" stroke="#333" stroke-width="1"/>
  <text x="302" y="161" text-anchor="middle" fill="#e0e0e0" font-size="11" font-weight="bold">SQLite</text>
  <text x="302" y="177" text-anchor="middle" fill="#666" font-size="10">~/.bosch-sdlc/state.db</text>

  <!-- Run Driver box -->
  <rect x="394" y="144" width="158" height="44" rx="6" fill="#1c1c1c" stroke="#333" stroke-width="1"/>
  <text x="473" y="161" text-anchor="middle" fill="#e0e0e0" font-size="11" font-weight="bold">Run Driver</text>
  <text x="473" y="177" text-anchor="middle" fill="#666" font-size="10">query() lifecycle</text>

  <!-- In-process MCP Server -->
  <rect x="228" y="212" width="324" height="52" rx="6" fill="#1a2a28" stroke="#2e6158" stroke-width="1.5"/>
  <text x="390" y="232" text-anchor="middle" fill="#4dd9c0" font-size="11" font-weight="bold">In-process MCP Server (bosch)</text>
  <text x="390" y="252" text-anchor="middle" fill="#6bbfb0" font-size="10">phase_start · phase_complete · checkpoint_start · checkpoint_complete · agent_start · agent_complete · gate_request</text>

  <!-- JSONL transcript -->
  <rect x="228" y="288" width="324" height="44" rx="6" fill="#1c1c1c" stroke="#333" stroke-width="1"/>
  <text x="390" y="305" text-anchor="middle" fill="#e0e0e0" font-size="11" font-weight="bold">JSONL Transcripts</text>
  <text x="390" y="321" text-anchor="middle" fill="#666" font-size="10">~/.bosch-sdlc/transcripts/&lt;run-id&gt;.jsonl</text>

  <!-- ═══════════════════════════════════════════════════════════
       RIGHT: Agent SDK + SKILL
  ═══════════════════════════════════════════════════════════ -->

  <!-- Claude Agent SDK box -->
  <rect x="620" y="76" width="252" height="44" rx="8" fill="#1a1a1a" stroke="#3a3a3a" stroke-width="1.5"/>
  <text x="746" y="93" text-anchor="middle" fill="#e0e0e0" font-size="11" font-weight="bold">Anthropic Agent SDK</text>
  <text x="746" y="109" text-anchor="middle" fill="#666" font-size="10">@anthropic-ai/claude-agent-sdk</text>

  <!-- feature-workflow SKILL box -->
  <rect x="620" y="152" width="252" height="52" rx="8" fill="#1a1a1a" stroke="#3a3a3a" stroke-width="1.5"/>
  <text x="746" y="172" text-anchor="middle" fill="#e0e0e0" font-size="11" font-weight="bold">feature-workflow SKILL</text>
  <text x="746" y="188" text-anchor="middle" fill="#666" font-size="10">target-repo/.claude/skills/feature-workflow/</text>
  <text x="746" y="202" text-anchor="middle" fill="#555" font-size="9">8 sub-agents · 7 phases</text>

  <!-- gate deferred box -->
  <rect x="620" y="228" width="252" height="44" rx="8" fill="#1a201e" stroke="#2e6158" stroke-width="1.5"/>
  <text x="746" y="246" text-anchor="middle" fill="#4dd9c0" font-size="11" font-weight="bold">gate_request → pause deferred</text>
  <text x="746" y="262" text-anchor="middle" fill="#6bbfb0" font-size="10">awaits UI resolve before continuing</text>

  <!-- ═══════════════════════════════════════════════════════════
       BOTTOM: Browser UI
  ═══════════════════════════════════════════════════════════ -->
  <rect x="138" y="400" width="500" height="92" rx="12" fill="#111" stroke="#2d2d2d" stroke-width="1.5"/>
  <text x="388" y="420" text-anchor="middle" fill="#aaa" font-size="11">Browser UI (React + TypeScript)</text>

  <rect x="156" y="430" width="140" height="44" rx="6" fill="#1c1c1c" stroke="#333" stroke-width="1"/>
  <text x="226" y="447" text-anchor="middle" fill="#e0e0e0" font-size="11" font-weight="bold">Dashboard / Project</text>
  <text x="226" y="463" text-anchor="middle" fill="#666" font-size="10">Kickoff · Active Run</text>

  <rect x="318" y="430" width="140" height="44" rx="6" fill="#1c1c1c" stroke="#333" stroke-width="1"/>
  <text x="388" y="447" text-anchor="middle" fill="#e0e0e0" font-size="11" font-weight="bold">Review Gate</text>
  <text x="388" y="463" text-anchor="middle" fill="#666" font-size="10">approve / reject + changes</text>

  <rect x="480" y="430" width="140" height="44" rx="6" fill="#1c1c1c" stroke="#333" stroke-width="1"/>
  <text x="550" y="447" text-anchor="middle" fill="#e0e0e0" font-size="11" font-weight="bold">Pipeline / Stream</text>
  <text x="550" y="463" text-anchor="middle" fill="#666" font-size="10">Telemetry panes</text>

  <!-- ═══════════════════════════════════════════════════════════
       ARROWS — data flow
  ═══════════════════════════════════════════════════════════ -->

  <!-- Run Driver → SDK query() -->
  <line x1="570" y1="166" x2="618" y2="98" stroke="#4dd9c0" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="600" y="138" text-anchor="middle" fill="#4dd9c0" font-size="9">SDK query()</text>

  <!-- SDK ↔ SKILL -->
  <line x1="746" y1="120" x2="746" y2="150" stroke="#4dd9c0" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- SKILL → gate deferred -->
  <line x1="746" y1="204" x2="746" y2="226" stroke="#4dd9c0" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- MCP tools ← SKILL (bidirectional) -->
  <line x1="620" y1="195" x2="554" y2="235" stroke="#4dd9c0" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow2)"/>
  <text x="594" y="222" text-anchor="middle" fill="#4dd9c0" font-size="9">MCP tool calls</text>

  <!-- gate_request → paused-gate label -->
  <line x1="620" y1="250" x2="556" y2="250" stroke="#4dd9c0" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow2)"/>
  <text x="590" y="244" text-anchor="middle" fill="#4dd9c0" font-size="9">gate event</text>

  <!-- MCP Server → broadcast → WS -->
  <line x1="473" y1="212" x2="473" y2="122" stroke="#4dd9c0" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrow)"/>
  <text x="493" y="168" text-anchor="start" fill="#4dd9c0" font-size="9">broadcast</text>

  <!-- WS → Browser (right side of WebSocket box → top of browser UI) -->
  <line x1="473" y1="120" x2="473" y2="120"/>
  <!-- vertical line from WS rooms down to browser -->
  <line x1="462" y1="120" x2="462" y2="398" stroke="#4dd9c0" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="432" y="270" text-anchor="middle" fill="#4dd9c0" font-size="9" transform="rotate(-90,432,270)">WebSocket events</text>

  <!-- Browser → REST API (POST /api/runs) -->
  <line x1="302" y1="398" x2="302" y2="122" stroke="#4dd9c0" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="272" y="280" text-anchor="middle" fill="#4dd9c0" font-size="9" transform="rotate(-90,272,280)">POST /api/runs</text>

  <!-- REST API → Run Driver internal connector -->
  <line x1="376" y1="98" x2="392" y2="144" stroke="#555" stroke-width="1" stroke-dasharray="2,2" marker-end="url(#arrowGray)"/>

  <!-- gate resolve: Browser (Review Gate) → REST gate resolve endpoint -->
  <path d="M 388 430 Q 388 380 302 380 Q 302 362 302 340" stroke="#4dd9c0" stroke-width="1.5" stroke-dasharray="4,3" fill="none" marker-end="url(#arrow)"/>
  <text x="348" y="378" text-anchor="middle" fill="#4dd9c0" font-size="9">POST .../gate/:id/resolve</text>

  <!-- SQLite ↔ Run Driver -->
  <line x1="376" y1="162" x2="392" y2="162" stroke="#555" stroke-width="1" stroke-dasharray="2,2" marker-end="url(#arrowGray)"/>

  <!-- SKILL events label (right of gate box) -->
  <text x="626" y="290" text-anchor="start" fill="#888" font-size="9">SKILL events →</text>
  <text x="626" y="302" text-anchor="start" fill="#888" font-size="9">broadcast via WS</text>

  <!-- ═══════════════════════════════════════════════════════════
       LEGEND
  ═══════════════════════════════════════════════════════════ -->
  <rect x="660" y="380" width="212" height="112" rx="8" fill="#111" stroke="#2d2d2d" stroke-width="1"/>
  <text x="766" y="398" text-anchor="middle" fill="#888" font-size="10" font-weight="bold">Legend</text>
  <line x1="676" y1="414" x2="720" y2="414" stroke="#4dd9c0" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="728" y="418" text-anchor="start" fill="#aaa" font-size="10">data flow</text>
  <line x1="676" y1="434" x2="720" y2="434" stroke="#4dd9c0" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="728" y="438" text-anchor="start" fill="#aaa" font-size="10">async / deferred</text>
  <line x1="676" y1="454" x2="720" y2="454" stroke="#555" stroke-width="1" stroke-dasharray="2,2" marker-end="url(#arrowGray)"/>
  <text x="728" y="458" text-anchor="start" fill="#aaa" font-size="10">internal</text>
  <rect x="676" y="466" width="12" height="12" rx="3" fill="#1a2a28" stroke="#2e6158" stroke-width="1"/>
  <text x="696" y="477" text-anchor="start" fill="#4dd9c0" font-size="10">MCP / gate boundary</text>

  <!-- ═══════════════════════════════════════════════════════════
       DEFS: arrowheads
  ═══════════════════════════════════════════════════════════ -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4dd9c0"/>
    </marker>
    <marker id="arrow2" markerWidth="8" markerHeight="8" refX="0" refY="3" orient="auto-start-reverse">
      <path d="M0,0 L0,6 L8,3 z" fill="#4dd9c0"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
  </defs>
</svg>
